services:
  caddy:
    image: caddy:2.8-alpine
    container_name: unity-lands-caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ../..
      dockerfile: client/Dockerfile
    container_name: unity-lands-frontend
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    container_name: unity-lands-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: unity-lands-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
